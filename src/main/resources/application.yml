spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: cafe
  servlet:
    multipart:
      file-size-threshold: 0B
      max-file-size: 10MB
      max-request-size: 12MB

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-validity-time: ${JWT_ACCESS_TOKEN_VALIDITY_TIME}
  refresh-token-validity-time: ${JWT_REFRESH_TOKEN_VALIDITY_TIME}

media:
  storage:
    enabled: ${MEDIA_STORAGE_ENABLED:false}
    bucket: ${MEDIA_STORAGE_BUCKET:${S3_BUCKET_NAME:${AWS_S3_BUCKET:}}}
    region: ${MEDIA_STORAGE_REGION:${AWS_REGION:ap-northeast-2}}
    endpoint: ${MEDIA_STORAGE_ENDPOINT:}
    public-base-url: ${MEDIA_STORAGE_PUBLIC_BASE_URL:}
    access-key: ${MEDIA_STORAGE_ACCESS_KEY:${AWS_ACCESS_KEY_ID:}}
    secret-key: ${MEDIA_STORAGE_SECRET_KEY:${AWS_SECRET_ACCESS_KEY:}}
    path-style-access: ${MEDIA_STORAGE_PATH_STYLE_ACCESS:false}
    key-prefix: ${MEDIA_STORAGE_KEY_PREFIX:menu-images}
    max-image-size-bytes: ${MEDIA_STORAGE_MAX_IMAGE_SIZE_BYTES:10485760}
    allowed-image-extensions: jpg,jpeg,png,webp
