spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: cafe
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cafe}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345678}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    admin:
      fail-fast: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:cafe-service}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: manual_immediate
  servlet:
    multipart:
      file-size-threshold: 0B
      max-file-size: 10MB
      max-request-size: 12MB
  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:none}
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
          temperature: ${OPENAI_CHAT_TEMPERATURE:0.4}

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-validity-time: ${JWT_ACCESS_TOKEN_VALIDITY_TIME:3600000}
  refresh-token-validity-time: ${JWT_REFRESH_TOKEN_VALIDITY_TIME:1209600000}

media:
  storage:
    enabled: ${MEDIA_STORAGE_ENABLED:false}
    bucket: ${MEDIA_STORAGE_BUCKET:${S3_BUCKET_NAME:${AWS_S3_BUCKET:}}}
    region: ${MEDIA_STORAGE_REGION:${AWS_REGION:ap-northeast-2}}
    endpoint: ${MEDIA_STORAGE_ENDPOINT:}
    public-base-url: ${MEDIA_STORAGE_PUBLIC_BASE_URL:}
    access-key: ${MEDIA_STORAGE_ACCESS_KEY:${AWS_ACCESS_KEY_ID:}}
    secret-key: ${MEDIA_STORAGE_SECRET_KEY:${AWS_SECRET_ACCESS_KEY:}}
    path-style-access: ${MEDIA_STORAGE_PATH_STYLE_ACCESS:false}
    key-prefix: ${MEDIA_STORAGE_KEY_PREFIX:menu-images}
    max-image-size-bytes: ${MEDIA_STORAGE_MAX_IMAGE_SIZE_BYTES:10485760}
    allowed-image-extensions: jpg,jpeg,png,webp

app:
  dummy-data:
    enabled: ${DUMMY_DATA_ENABLED:true}
